<!DOCTYPE html>
<html>
  <head>
    <title>3. Hovers, Transitions, Shadows</title>
    <style>
      a {
        color: rgb(0, 100, 200);
        cursor: pointer;
      }

      a:hover {
        color: rgb(200, 100, 0);
      }

      .p1 {
        font-size: 24px;
        font-weight: 600;
      }

      .p2 {
        color: rgb(0, 120, 0);
        font-weight: 600;
      }
      
      button {
        width: 128px;
        height: 32px;
        border: none;
        border-radius: 16px;
        cursor: pointer;
      }

      .b1 {
        background-color: rgb(250, 200, 0);
      }

      .b1:hover {
        background-color: rgb(225, 175, 0);
      }

      .b1:active {
        background-color: rgb(250, 200, 100);
      }

      .b2 {
        background-color: rgb(250, 150, 0);
      }

      .b2:hover {
        background-color: rgb(225, 125, 0);
      }

      .b2:active {
        background-color: rgb(250, 150, 100);
      }
    </style>
  </head>
  <body>
    <a href="https://www.amazon.com/" target="_blank">Back to Amazon</a>
    <p class="p1">Nike Black Running Shoes</p>
    <p class="p2">$39 - in stock.</p>
    <p>Free delivery tomorrow.</p>
    <button class="b1">Add to Cart</button>
    <button class="b2">Buy now</button>
  </body>
</html>
