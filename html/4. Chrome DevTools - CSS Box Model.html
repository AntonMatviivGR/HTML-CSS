<!DOCTYPE html>
<html>
  <head>
    <title>4. Chrome DevTools - CSS Box Model</title>
    <style>
      div {
        margin: 32px 16px;
      }

      a {
        margin: 0 4px;
      }

      .div1 button {
        padding: 8px 4px 8px 4px;
        cursor: pointer;
      }

      .div2 button, 
      .div3 button,
      .div4 button {
        color: rgb(250, 250, 250);
        background-color: rgb(0, 150, 0);
        padding: 8px 16px;
        margin: 0 8px;
        border: none;
        cursor: pointer;
      }

      .div2 button {
        transition: padding, 0.75s;
      }

      .div2 button:hover {
        padding: 64px 128px;
      }

      .div3 button:hover {
        box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4);
      }

      .div3 button:active {
        box-shadow: none;
        margin: 2px 0 0 10px;
      }

      .div4 button {
        transition: padding, margin, 0.25s;
      }

      .div4 button:hover {
        padding: 8px 24px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="div1">
      <button>Back</button>
      <a href="">1</a>
      <a href="">2</a>
      <a href="">3</a>
      <a href="">4</a>
      <a href="">5</a>
      <button>Next</button>
    </div>
    <div class="div2">
      <button>Stretch</button>
    </div>
    <div class="div3">
      <button>Shadow</button>
    </div>
    <div class="div4">
      <button>One</button>
      <button>Two</button>
      <button>Three</button>
    </div>
  </body>
</html>
